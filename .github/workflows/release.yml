name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to use as the chart tag"
        required: true

permissions:
  contents: write

env:
  CHART_DIR: charts/w7panel-longhorn
  CHART_PACKAGE_DIR: charts
  ZPK_HOST: zpk.w7.cc
  ZPK_ARTIFACT: w7panel-longhorn
jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Package Helm chart
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_TAG="${{ steps.tag.outputs.value }}"
          RELEASE_VERSION="${RELEASE_TAG#v}"

          rm -f "${CHART_PACKAGE_DIR}"/*.tgz
          helm lint "${CHART_DIR}"
          helm package "${CHART_DIR}" \
            --destination "${CHART_PACKAGE_DIR}" \
            --version "${RELEASE_VERSION}" \
            --app-version "${RELEASE_TAG}"

      - name: Upload Helm package to GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          files: charts/*.tgz
      - name: Push zpk
        env:
          ZPK_DOCKER_USERNAME: ${{ secrets.ZPK_DOCKER_USERNAME }}
          ZPK_DOCKER_PASSWORD: ${{ secrets.ZPK_DOCKER_PASSWORD }}
        run: |
          sudo curl -L --fail -o /usr/local/bin/zpk https://github.com/w7panel/w7panel-zpk/releases/download/latest/zpk_linux_amd64
          sudo chmod +x /usr/local/bin/zpk
          RELEASE_TAG="${{ steps.tag.outputs.value }}"
          set -euo pipefail

          if [ -z "${ZPK_DOCKER_USERNAME}" ]; then
            echo "ZPK_DOCKER_USERNAME secret is required"
            exit 1
          fi
          if [ -z "${ZPK_DOCKER_PASSWORD}" ]; then
            echo "ZPK_DOCKER_PASSWORD secret is required"
            exit 1
          fi
          if [ -z "${ZPK_HOST}" ]; then
            echo "ZPK_HOST is required"
            exit 1
          fi
          if [ -z "${ZPK_ARTIFACT}" ]; then
            echo "ZPK_ARTIFACT is required"
            exit 1
          fi

          HELM_PACKAGE="$(ls charts/*.tgz | head -n 1)"
          if [ -z "${HELM_PACKAGE}" ]; then
            echo "helm package not found under charts/"
            exit 1
          fi

          zpk login --username="${ZPK_DOCKER_USERNAME}" --password="${ZPK_DOCKER_PASSWORD}" --host="${ZPK_HOST}"
          zpk use "${ZPK_HOST}/zpk_oci/${ZPK_ARTIFACT}:${RELEASE_TAG}"
          zpk attach add --path="${HELM_PACKAGE}" --type=helm
          zpk push    
