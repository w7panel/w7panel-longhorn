name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to use as the chart tag"
        required: true

permissions:
  contents: write

env:
  CHART_DIR: charts/w7panel-longhorn
  CHART_PACKAGE_DIR: charts

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Package Helm chart
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_TAG="${{ steps.tag.outputs.value }}"
          RELEASE_VERSION="${RELEASE_TAG#v}"

          rm -f "${CHART_PACKAGE_DIR}"/*.tgz
          helm lint "${CHART_DIR}"
          helm package "${CHART_DIR}" \
            --destination "${CHART_PACKAGE_DIR}" \
            --version "${RELEASE_VERSION}" \
            --app-version "${RELEASE_TAG}"

      - name: Upload Helm package to GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          files: charts/*.tgz
